<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>🇰🇿 Travel KZ</h1>
      <p>Welcome back!</p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Enter username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter password" />
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>

    <button class="btn-login" (click)="login()" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="register-link">
      Don't have an account?
      <a (click)="router.navigate(['/register'])">Sign Up</a>
    </p>
  </div>
</div>
