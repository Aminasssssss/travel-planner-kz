<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>🇰🇿 Travel KZ</h1>
      <p>Create your account</p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Enter username" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter password" />
    </div>

    @if (error) {
      <div class="error">{{ error }}</div>
    }
    <button class="btn-login" (click)="register()" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Sign Up' }}
    </button>

    <p class="register-link">
      Already have an account?
      <a (click)="router.navigate(['/login'])">Login</a>
    </p>
  </div>
</div>
